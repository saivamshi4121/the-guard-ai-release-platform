name: The Guard Release Gate

on:
  pull_request:
    paths:
      - "prompts/**"
      - "packages/eval/**"
      - "packages/llm/**"
      - "packages/regression/**"
      - "packages/hallucination/**"
      - "packages/benchmark/**"
      - "packages/reports/**"
      - "apps/**"
      - "packages/contracts/**"
      - "packages/db/**"

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.3"

      - name: Install
        run: pnpm -w install

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Run eval (placeholder)
        run: |
          echo "Eval step should run apps/runner with real DB + provider keys"
          echo "Skipping in template workflow"

      - name: Run regression gate (requires run IDs)
        id: regression
        run: |
          mkdir -p reports
          # These IDs should be provided by earlier steps or environment.
          if [ -z "${BASELINE_RUN_ID}" ] || [ -z "${CANDIDATE_RUN_ID}" ]; then
            echo "Missing BASELINE_RUN_ID or CANDIDATE_RUN_ID; marking inconclusive."
            exit 2
          fi
          pnpm -w regression:check --baseline "${BASELINE_RUN_ID}" --candidate "${CANDIDATE_RUN_ID}" --json "reports/regression-report.json" --markdown "reports/regression-report.md"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BASELINE_RUN_ID: ${{ secrets.BASELINE_RUN_ID }}
          CANDIDATE_RUN_ID: ${{ secrets.CANDIDATE_RUN_ID }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: the-guard-reports
          path: reports/

      - name: Comment PR summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/regression-report.md';
            let body = '## The Guard Release Gate\n\n(No report generated)';
            if (fs.existsSync(path)) body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

